pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{js,ts,jsx,tsx,json,css,svelte,astro}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,ts,jsx,tsx,svelte,astro}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    type-check:
      run: npm run check
